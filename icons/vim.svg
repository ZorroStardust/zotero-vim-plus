<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <!-- Background: Tokyo Night dark (canonical NeoVim theme) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#24283b"/>
      <stop offset="100%" stop-color="#1a1b26"/>
    </linearGradient>
    <!-- Left page: deep navy (NeoVim blue family) -->
    <linearGradient id="lp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#162d62"/>
      <stop offset="100%" stop-color="#1d3878"/>
    </linearGradient>
    <!-- Right page: deep forest (NeoVim green family) -->
    <linearGradient id="rp" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#163a1a"/>
      <stop offset="100%" stop-color="#1d4a22"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="48" height="48" rx="9" fill="url(#bg)"/>

  <!--
    Open book. The angled top edges (left page: / diagonal, right page: \ diagonal)
    deliberately echo the NeoVim logo's sharp angular strokes.
    Left page = NeoVim blue, Right page = NeoVim green.
  -->

  <!-- Left page -->
  <polygon points="5,17 22,8 22,43 5,43" fill="url(#lp)"/>

  <!-- Right page -->
  <polygon points="26,8 43,17 43,43 26,43" fill="url(#rp)"/>

  <!-- Book spine (deep dark groove) -->
  <rect x="22" y="8" width="4" height="35" fill="#0b0c18"/>

  <!-- ── Left page: text lines (NeoVim blue #16B0ED) ── -->
  <rect x="7"  y="20" width="13" height="1.5" rx="0.5" fill="#16B0ED" opacity="0.6"/>
  <rect x="7"  y="25" width="11" height="1.5" rx="0.5" fill="#16B0ED" opacity="0.6"/>
  <rect x="7"  y="30" width="14" height="1.5" rx="0.5" fill="#16B0ED" opacity="0.6"/>
  <rect x="7"  y="35" width="10" height="1.5" rx="0.5" fill="#16B0ED" opacity="0.6"/>
  <rect x="7"  y="40" width="12" height="1.5" rx="0.5" fill="#16B0ED" opacity="0.6"/>

  <!-- ── Right page: text lines + Vim cursor on line 2 ── -->

  <!-- Line 1 (normal) -->
  <rect x="28" y="20" width="13" height="1.5" rx="0.5" fill="#7DB643" opacity="0.6"/>

  <!-- Line 2: Vim cursor line -->
  <!-- Full-line highlight (low opacity) -->
  <rect x="28" y="25" width="13" height="3" rx="0.5" fill="#88C649" opacity="0.18"/>
  <!-- Block cursor (one character wide, bright NeoVim green) -->
  <rect x="28" y="25" width="4" height="3" rx="0.5" fill="#88C649"/>
  <!-- Text after cursor -->
  <rect x="33" y="26" width="8" height="1.5" rx="0.5" fill="#7DB643" opacity="0.6"/>

  <!-- Lines 3-5 (normal) -->
  <rect x="28" y="30" width="11" height="1.5" rx="0.5" fill="#7DB643" opacity="0.6"/>
  <rect x="28" y="35" width="13" height="1.5" rx="0.5" fill="#7DB643" opacity="0.6"/>
  <rect x="28" y="40" width="9"  height="1.5" rx="0.5" fill="#7DB643" opacity="0.6"/>
</svg>
